<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet"h ref="style.css">
</head>
<body>
    <div class="container">
    <h2>Cadastro</h2>
    <from id="formCadastro">
    <div class="campo">
    <label for="Nome">
        Nome
    </label>
    <input
    type="text"
    id="Nome"
    name="Nome"
    placeholder="DigiteSeuNome"
    required>
    </div>

    <div class="campo">
    <label for="email">
        Email
    </label>
    <input
    type="email"
    id="email"
    name="email"
    placeholder="Digite Seu Email"
    required>
    </div>

    <div class="campo">
    <label for="Celular">
        Celular
    </label>
    <input
    type="tel"
    id="Celular"
    name="Celular"
    placeholder="(11)99999-9999"
    required>
    </div>

    <div class="campo">
    <label for="SenhaCadastro">
        Senha
    </label>
    <input
    type="password"
    id="SenhaCadastro"
    name="SenhaCadastro"
    placeholder="DigiteSuaSenha"
    required>
    </div>

    <div class="campo">
    <label for="Comfirmar Senha">
        Confirmar Senha
    </label>
    <input
    type="password"
    id="Confirmar senha"
    placeholder="ConfirmeSuaSenha"
    required>
    </div>

    <button type="submit">
        Cadastrar
    </button>

    <div class="links">
    <a href="Login.html">
        Voltar ao Login
    </a>
    </div>

    <p id="Mensagem Cadastro"></p>
    </from>
    </div>
<script src="Script.js"></script>
</body>
</html>
